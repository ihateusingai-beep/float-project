<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23667eea' width='180' height='180' rx='40'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='100'>🌊</text></svg>">
    <title>浮力大發現 - 匡智張玉瓊晨暉學校</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --primary: #2196F3; --secondary: #4CAF50; --accent: #FF9800; --danger: #f44336; --dark: #1565C0; --light: #E3F2FD; --text: #333; --font-scale: 1; }
        html { font-size: calc(16px * var(--font-scale)); }
        body { font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: var(--text); overflow-x: hidden; }

        /* Header */
        .header { background: rgba(255,255,255,0.95); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 1.3em; font-weight: bold; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .logo-icon { font-size: 1.6em; }
        .header-btns { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn { padding: 10px 16px; border: none; border-radius: 10px; font-size: 0.95em; font-weight: bold; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; min-height: 44px; touch-action: manipulation; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-teal { background: #009688; color: white; }
        .font-btn { width: 44px; height: 44px; border: none; border-radius: 8px; background: var(--light); color: var(--primary); font-size: 1.1em; font-weight: bold; cursor: pointer; min-width: 44px; }
        .font-btn:active { background: var(--primary); color: white; }

        /* Main container */
        .main { padding: 15px; max-width: 900px; margin: 0 auto; }

        /* Card */
        .card { background: white; border-radius: 16px; padding: 18px; margin-bottom: 15px; box-shadow: 0 6px 24px rgba(0,0,0,0.1); }
        .card-title { font-size: 1.2em; color: var(--primary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

        /* Pool Container */
        .pool-container { position: relative; width: 100%; max-width: 450px; margin: 0 auto; aspect-ratio: 1; background: linear-gradient(180deg, #81D4FA 0%, #29B6F6 50%, #0288D1 100%); border-radius: 16px; overflow: hidden; border: 6px solid #01579B; touch-action: none; }
        .water { position: absolute; bottom: 0; left: 0; right: 0; height: 65%; background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, rgba(33,150,243,0.5) 100%); transition: height 0.5s; }
        .water-surface { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: rgba(255,255,255,0.5); animation: wave 2s ease-in-out infinite; }
        @keyframes wave { 0%, 100% { transform: translateX(-3px) scaleY(1); } 50% { transform: translateX(3px) scaleY(0.5); } }

        /* Object in pool */
        .object-item { position: absolute; cursor: grab; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: bold; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); user-select: none; touch-action: none; transition: transform 0.2s; }
        .object-item:active { cursor: grabbing; transform: scale(1.1); }
        .object-icon { font-size: 36px; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3)); }
        .object-density { background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 6px; margin-top: 3px; font-size: 0.8em; }

        /* Object Shelf */
        .object-shelf { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 10px; margin-top: 15px; }
        .shelf-item { background: linear-gradient(145deg, #fff, #e6e6e6); border-radius: 12px; padding: 12px 8px; text-align: center; cursor: grab; transition: all 0.2s; border: 3px solid transparent; min-height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
        .shelf-item:active { cursor: grabbing; transform: scale(0.95); border-color: var(--primary); }
        .shelf-item .icon { font-size: 32px; }
        .shelf-item .name { font-size: 0.85em; font-weight: bold; color: #333; }
        .shelf-item .density { font-size: 0.7em; color: #666; }

        /* Info Panel */
        .info-panel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .info-box { background: linear-gradient(135deg, var(--light), white); border-radius: 12px; padding: 12px; text-align: center; border: 2px solid var(--primary); }
        .info-box .value { font-size: 1.5em; font-weight: bold; color: var(--primary); }
        .info-box .label { font-size: 0.8em; color: #666; }

        /* Density indicator */
        .density-indicator { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.75); color: white; padding: 6px 10px; border-radius: 8px; font-size: 0.8em; z-index: 40; display: none; }
        .density-low { border: 2px solid #4CAF50; }
        .density-high { border: 2px solid #f44336; }

        /* Buoyancy arrows */
        .buoyancy-arrow { position: absolute; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 50; animation: buoyancyPulse 1.5s ease-in-out infinite; }
        .buoyancy-arrow.up { animation: buoyancyUp 1.5s ease-in-out infinite; }
        .buoyancy-arrow.down { animation: buoyancyDown 1.5s ease-in-out infinite; }
        @keyframes buoyancyUp { 0%, 100% { transform: translateX(-50%) translateY(0); opacity: 1; } 50% { transform: translateX(-50%) translateY(-6px); opacity: 0.8; } }
        @keyframes buoyancyDown { 0%, 100% { transform: translateX(-50%) translateY(0); opacity: 1; } 50% { transform: translateX(-50%) translateY(6px); opacity: 0.8; } }
        .arrow-symbol { font-size: 24px; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); }
        .buoyancy-arrow.up .arrow-symbol { color: #f44336; }
        .buoyancy-arrow.down .arrow-symbol { color: #2196F3; }
        .arrow-label { background: rgba(0,0,0,0.7); color: white; padding: 3px 8px; border-radius: 6px; font-size: 0.75em; font-weight: bold; white-space: nowrap; }

        /* History */
        .history-list { max-height: 200px; overflow-y: auto; }
        .history-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--light); border-radius: 10px; margin-bottom: 6px; }
        .history-item .action { flex: 1; font-size: 0.9em; }
        .history-item .result { padding: 3px 10px; border-radius: 15px; font-size: 0.8em; font-weight: bold; color: white; }
        .result-float { background: var(--secondary); }
        .result-sink { background: var(--danger); }

        /* Sound bubble */
        .sound-bubble { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 20px; border-radius: 20px; font-size: 1em; z-index: 200; display: none; animation: fadeInOut 2.5s ease; max-width: 90%; text-align: center; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(15px); } 15% { opacity: 1; transform: translateX(-50%) translateY(0); } 85% { opacity: 1; transform: translateX(-50%) translateY(0); } 100% { opacity: 0; transform: translateX(-50%) translateY(-15px); } }

        /* Settings floating button */
        .settings-fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 1.5em; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .settings-fab:active { transform: scale(0.95); }

        /* Settings panel */
        .settings-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
        .settings-panel.active { display: flex; }
        .settings-content { background: white; border-radius: 20px; padding: 25px; max-width: 400px; width: 100%; max-height: 80vh; overflow-y: auto; }
        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .settings-header h3 { color: var(--primary); }
        .settings-close { width: 40px; height: 40px; border-radius: 50%; background: var(--light); border: none; font-size: 1.4em; cursor: pointer; }
        .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--light); border-radius: 10px; margin-bottom: 10px; }
        .setting-text { font-size: 0.95em; }
        .toggle-switch { position: relative; width: 52px; height: 30px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: 0.4s; border-radius: 30px; }
        .toggle-slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: white; transition: 0.4s; border-radius: 50%; }
        input:checked + .toggle-slider { background-color: var(--primary); }
        input:checked + .toggle-slider:before { transform: translateX(22px); }

        /* Footer */
        .footer { text-align: center; padding: 15px; color: rgba(255,255,255,0.8); font-size: 0.85em; }
        .footer a { color: rgba(255,255,255,0.6); }

        /* Voice btn pulse */
        .voice-btn { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .voice-btn:active { animation: none; }

        /* Responsive */
        @media (max-width: 500px) {
            .header { flex-direction: column; gap: 8px; }
            .header-btns { width: 100%; justify-content: center; }
            .info-panel { grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .info-box .value { font-size: 1.2em; }
            .pool-container { max-width: 320px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🌊</span>
            <span>浮力大發現</span>
        </div>
        <div class="header-btns">
            <button class="btn btn-accent voice-btn" id="voiceBtn" onclick="toggleVoice()">
                <span id="voiceIcon">🔊</span>
                <span id="voiceText">語音</span>
            </button>
            <button class="font-btn" onclick="adjustFontSize(-0.1)" title="字體縮小">A-</button>
            <button class="font-btn" onclick="adjustFontSize(0.1)" title="字體放大">A+</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Experiment Pool Card -->
        <div class="card">
            <div class="card-title">🌊 浮力實驗池</div>
            <p style="color:#666;margin-bottom:12px;font-size:0.9em;">拖拽物品到水裡，睇下件嘢係會浮定會沉！</p>
            
            <div class="pool-container" id="pool">
                <div class="water" id="water"><div class="water-surface"></div></div>
                <div id="pool-objects"></div>
                <div class="density-indicator" id="densityIndicator"></div>
            </div>
            
            <div class="object-shelf" id="objectShelf"></div>
            
            <div class="info-panel">
                <div class="info-box">
                    <div class="value" id="densityValue">-</div>
                    <div class="label">物件夠唔夠力浮</div>
                </div>
                <div class="info-box">
                    <div class="value" id="waterDensity">1.0</div>
                    <div class="label">幾錘先浮</div>
                </div>
                <div class="info-box">
                    <div class="value" id="resultText">-</div>
                    <div class="label">實驗結果</div>
                </div>
            </div>
        </div>

        <!-- Experiment History Card -->
        <div class="card">
            <div class="card-title">📝 實驗紀錄</div>
            <div class="history-list" id="historyList">
                <p style="color:#999;text-align:center;padding:20px;">還沒有實驗紀錄</p>
            </div>
        </div>
    </main>

    <!-- Settings FAB -->
    <button class="settings-fab" onclick="toggleSettings()">⚙️</button>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-content">
            <div class="settings-header">
                <h3>⚙️ 設置</h3>
                <button class="settings-close" onclick="toggleSettings()">×</button>
            </div>
            
            <div class="setting-row">
                <span class="setting-text">🔊 開啟語音提示</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="voiceEnabled" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            
            <div class="setting-row">
                <span class="setting-text">💧 幾錘先浮</span>
                <input type="number" id="waterDensitySetting" value="1.0" min="0.5" max="2" step="0.1" style="width:70px;padding:8px;border-radius:8px;border:2px solid #ddd;" onchange="updateWaterDensity()">
            </div>
            
            <button class="btn btn-primary btn-full" style="margin-top:15px;" onclick="clearAllData()">🗑️ 清除所有數據</button>
        </div>
    </div>

    <!-- Sound Bubble -->
    <div class="sound-bubble" id="soundBubble"></div>

    <!-- Footer -->
    <div class="footer">
        <p>匡智張玉瓊晨暉學校 © 2024 | 浮力大發現</p>
        <p style="margin-top:5px;">🌊 用心探索水的秘密</p>
    </div>

    <script>
        // ============ Core Objects (8 items with real images) ============
        const OBJECTS = [
            { id: 'wood', name: '木塊', icon: 'wood-block.png', density: 0.6 },
            { id: 'stone', name: '石頭', icon: 'stone.png', density: 2.5 },
            { id: 'apple', name: '蘋果', icon: 'apple.png', density: 0.9 },
            { id: 'coin', name: '硬幣', icon: 'coin.png', density: 7.0 },
            { id: 'key', name: '鎖匙', icon: 'key.png', density: 7.8 },
            { id: 'spoon', name: '匙羹', icon: 'spoon.png', density: 7.8 },
            { id: 'balloon', name: '氣球', icon: 'balloon.png', density: 0.3 },
            { id: 'duck', name: '膠鴨', icon: 'rubber-duck.png', density: 0.3 }
        ];

        // ============ State ============
        let state = {
            voiceEnabled: true,
            waterDensity: 1.0,
            fontScale: 1,
            experiments: []
        };

        let voiceOn = true;
        let poolObjects = [];
        let poolObjectIdCounter = 0;
        let selectedObject = null;

        // ============ Initialization ============
        function init() {
            loadState();
            renderObjectShelf();
            updateWaterDensityDisplay();
            renderHistory();
            
            // Welcome voice prompt
            if (voiceOn && state.voiceEnabled) {
                setTimeout(() => speak('你好！歡迎嚟到浮力實驗室！拖件物件落水試試！'), 1500);
            }

            // Service worker for offline
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('service-worker.js')
                    .catch(err => console.log('SW registration failed:', err));
            }
        }

        function loadState() {
            const saved = localStorage.getItem('floatProjectState');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state = { ...state, ...parsed };
                } catch(e) {
                    console.warn('載入狀態失敗');
                }
            }
            voiceOn = state.voiceEnabled;
            applyFontScale(state.fontScale || 1);
            
            // Sync UI with state
            document.getElementById('voiceEnabled').checked = state.voiceEnabled;
            document.getElementById('waterDensitySetting').value = state.waterDensity;
            document.getElementById('voiceIcon').textContent = voiceOn ? '🔊' : '🔇';
        }

        function saveState() {
            localStorage.setItem('floatProjectState', JSON.stringify(state));
        }

        function applyFontScale(scale) {
            scale = Math.max(0.7, Math.min(1.5, scale));
            document.documentElement.style.setProperty('--font-scale', scale);
            state.fontScale = scale;
        }

        function adjustFontSize(delta) {
            applyFontScale((state.fontScale || 1) + delta);
            saveState();
        }

        // ============ Object Shelf ============
        function renderObjectShelf() {
            const shelf = document.getElementById('objectShelf');
            shelf.innerHTML = OBJECTS.map(obj => `
                <div class="shelf-item" draggable="true" data-id="${obj.id}">
                    <img src="assets/images/${obj.icon}" alt="${obj.name}" style="width:48px;height:48px;object-fit:contain;" onerror="this.textContent='${obj.name}'">
                    <span class="name">${obj.name}</span>
                    <span class="density">輕: ${obj.density}</span>
                </div>
            `).join('');

            shelf.querySelectorAll('.shelf-item').forEach(item => {
                item.addEventListener('dragstart', handleDragStart);
                item.addEventListener('touchstart', handleTouchStart, { passive: false });
                item.addEventListener('click', handleItemClick);
            });
        }

        function handleItemClick(e) {
            const id = e.currentTarget.dataset.id;
            const obj = OBJECTS.find(o => o.id === id);
            if (!obj) return;
            selectedObject = obj;
            updateInfoPanel(obj);
        }

        function handleDragStart(e) {
            e.dataTransfer.setData('text/plain', e.target.dataset.id);
        }

        // ============ Touch Drag ============
        let touchDragId = null;
        let touchClone = null;

        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const target = e.currentTarget;
            touchDragId = target.dataset.id;

            touchClone = target.cloneNode(true);
            touchClone.style.position = 'fixed';
            touchClone.style.pointerEvents = 'none';
            touchClone.style.opacity = '0.8';
            touchClone.style.zIndex = '1000';
            touchClone.style.transform = 'scale(1.1)';
            document.body.appendChild(touchClone);

            updateClonePosition(touch);
            document.addEventListener('touchmove', handleTouchMove, { passive: false });
            document.addEventListener('touchend', handleTouchEnd);
        }

        function handleTouchMove(e) {
            e.preventDefault();
            updateClonePosition(e.touches[0]);
        }

        function updateClonePosition(touch) {
            if (touchClone) {
                touchClone.style.left = (touch.clientX - 50) + 'px';
                touchClone.style.top = (touch.clientY - 50) + 'px';
            }
        }

        function handleTouchEnd(e) {
            document.removeEventListener('touchmove', handleTouchMove);
            document.removeEventListener('touchend', handleTouchEnd);

            if (touchClone) {
                document.body.removeChild(touchClone);
                touchClone = null;
            }

            const touch = e.changedTouches[0];
            const pool = document.getElementById('pool');
            const poolRect = pool.getBoundingClientRect();

            if (touch.clientX >= poolRect.left && touch.clientX <= poolRect.right &&
                touch.clientY >= poolRect.top && touch.clientY <= poolRect.bottom) {
                if (touchDragId) {
                    addObjectToPool(touchDragId, touch.clientX - poolRect.left, touch.clientY - poolRect.top);
                }
            }

            touchDragId = null;
        }

        // ============ Pool Experiment ============
        function setupPool() {
            const pool = document.getElementById('pool');
            pool.addEventListener('dragover', e => e.preventDefault());
            pool.addEventListener('drop', handlePoolDrop);
        }

        function handlePoolDrop(e) {
            e.preventDefault();
            const id = e.dataTransfer.getData('text/plain');
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            addObjectToPool(id, x, y);
        }

        function addObjectToPool(objectId, x, y) {
            const obj = OBJECTS.find(o => o.id === objectId);
            if (!obj) return;

            // Update info panel
            selectedObject = obj;
            updateInfoPanel(obj);

            const id = poolObjectIdCounter++;
            const pool = document.getElementById('pool');
            const poolRect = pool.getBoundingClientRect();

            // Clamp position
            x = Math.max(30, Math.min(poolRect.width - 30, x));
            y = Math.max(30, Math.min(poolRect.height - 30, y));

            const element = document.createElement('div');
            element.className = 'object-item';
            element.id = `pool-obj-${id}`;
            element.innerHTML = `
                <img src="assets/images/${obj.icon}" alt="${obj.name}" style="width:52px;height:52px;object-fit:contain;" onerror="this.textContent='${obj.name}'">
                <span class="object-density">${obj.density}</span>
            `;
            element.style.left = x + 'px';
            element.style.top = y + 'px';
            element.style.transform = 'translate(-50%, -50%)';

            element.addEventListener('mousedown', startDragInPool);
            element.addEventListener('touchstart', startDragInPoolTouch, { passive: false });

            pool.appendChild(element);

            // Animate sink/float
            setTimeout(() => animateObjectSink(id, obj), 200);

            // Voice prompt
            if (voiceOn && state.voiceEnabled) {
                setTimeout(() => {
                    const prompts = ['試下拖件物件入水！', '邊件最輕呢？試下發泡膠！', '石頭好重，試下放落水！'];
                    speak(prompts[Math.floor(Math.random() * prompts.length)]);
                }, 400);
            }
        }

        // ============ Drag in Pool ============
        let dragInPool = null;
        let dragOffset = { x: 0, y: 0 };

        function startDragInPool(e) {
            e.preventDefault();
            dragInPool = e.currentTarget;
            const rect = dragInPool.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;
            document.addEventListener('mousemove', dragInPoolMove);
            document.addEventListener('mouseup', stopDragInPool);
        }

        function startDragInPoolTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            dragInPool = e.currentTarget;
            const rect = dragInPool.getBoundingClientRect();
            dragOffset.x = touch.clientX - rect.left;
            dragOffset.y = touch.clientY - rect.top;
            document.addEventListener('touchmove', dragInPoolMoveTouch, { passive: false });
            document.addEventListener('touchend', stopDragInPoolTouch);
        }

        function dragInPoolMove(e) {
            if (!dragInPool) return;
            const pool = document.getElementById('pool');
            const poolRect = pool.getBoundingClientRect();
            const x = e.clientX - poolRect.left - dragOffset.x + 25;
            const y = e.clientY - poolRect.top - dragOffset.y + 25;
            dragInPool.style.left = Math.max(30, Math.min(poolRect.width - 30, x)) + 'px';
            dragInPool.style.top = Math.max(30, Math.min(poolRect.height - 30, y)) + 'px';
        }

        function dragInPoolMoveTouch(e) {
            e.preventDefault();
            if (!dragInPool) return;
            const touch = e.touches[0];
            const pool = document.getElementById('pool');
            const poolRect = pool.getBoundingClientRect();
            const x = touch.clientX - poolRect.left - dragOffset.x + 25;
            const y = touch.clientY - poolRect.top - dragOffset.y + 25;
            dragInPool.style.left = Math.max(30, Math.min(poolRect.width - 30, x)) + 'px';
            dragInPool.style.top = Math.max(30, Math.min(poolRect.height - 30, y)) + 'px';
        }

        function stopDragInPool() {
            document.removeEventListener('mousemove', dragInPoolMove);
            document.removeEventListener('mouseup', stopDragInPool);
            dragInPool = null;
        }

        function stopDragInPoolTouch() {
            document.removeEventListener('touchmove', dragInPoolMoveTouch);
            document.removeEventListener('touchend', stopDragInPoolTouch);
            dragInPool = null;
        }

        // ============ Animate Float/Sink ============
        function animateObjectSink(poolObjId, obj) {
            const element = document.getElementById(`pool-obj-${poolObjId}`);
            if (!element) return;

            const pool = document.getElementById('pool');
            const poolHeight = pool.offsetHeight;
            const waterLevel = poolHeight * 0.35;
            const waterDensity = state.waterDensity;
            const willFloat = obj.density < waterDensity;
            const finalY = willFloat ? waterLevel : poolHeight - 30;

            element.style.transition = 'top 1s ease-in-out';
            element.style.top = finalY + 'px';

            setTimeout(() => {
                recordExperiment(obj, willFloat);
                showBuoyancyArrow(element, obj, willFloat);
            }, 1100);
        }

        function showBuoyancyArrow(element, obj, willFloat) {
            // Remove existing arrows
            document.querySelectorAll('.buoyancy-arrow').forEach(el => el.remove());

            const pool = document.getElementById('pool');
            const poolRect = pool.getBoundingClientRect();
            const elemRect = element.getBoundingClientRect();
            const x = elemRect.left - poolRect.left + elemRect.width / 2;
            const y = elemRect.top - poolRect.top;

            // Buoyancy arrow (up)
            const buoyancyArrow = document.createElement('div');
            buoyancyArrow.className = 'buoyancy-arrow up';
            buoyancyArrow.innerHTML = `<span class="arrow-symbol">↑</span><span class="arrow-label">浮力</span>`;
            buoyancyArrow.style.left = x + 'px';
            buoyancyArrow.style.top = (y - 50) + 'px';
            pool.appendChild(buoyancyArrow);

            // Gravity arrow (down) if sinks
            if (!willFloat) {
                const gravityArrow = document.createElement('div');
                gravityArrow.className = 'buoyancy-arrow down';
                gravityArrow.innerHTML = `<span class="arrow-symbol">↓</span><span class="arrow-label">重力</span>`;
                gravityArrow.style.left = x + 'px';
                gravityArrow.style.top = (y + 50) + 'px';
                pool.appendChild(gravityArrow);
            }

            // Show density indicator
            const indicator = document.getElementById('densityIndicator');
            indicator.style.display = 'block';
            if (obj.density < 1) {
                indicator.className = 'density-indicator density-low';
                indicator.innerHTML = `🌊 輕定重: ${obj.density} < 1 (會浮)`;
            } else {
                indicator.className = 'density-indicator density-high';
                indicator.innerHTML = `⚓ 輕定重: ${obj.density} ≥ 1 (會沉)`;
            }

            // Auto-hide after 3s
            setTimeout(() => {
                indicator.style.display = 'none';
                document.querySelectorAll('.buoyancy-arrow').forEach(el => el.remove());
            }, 4000);
        }

        // ============ Record & Stats ============
        function recordExperiment(obj, willFloat) {
            state.experiments.push({
                objectId: obj.id,
                objectName: obj.name,
                objectIcon: obj.icon,
                density: obj.density,
                isFloat: willFloat,
                time: Date.now()
            });

            saveState();
            renderHistory();

            // Voice feedback
            if (voiceOn && state.voiceEnabled) {
                const prompts = willFloat 
                    ? ['物件浮起喇！好嘢！', '浮咗！真係估你唔到！', '夠晒輕，梗係浮啦！']
                    : ['物件沉咗落去...', '太重喇，沉咗...', '物件好重會沉落去...'];
                speak(prompts[Math.floor(Math.random() * prompts.length)]);
            }

            showSoundBubble(willFloat ? '✅ 夠力浮起了！' : '❌ 唔夠力沉下去了...');
        }

        function updateInfoPanel(obj) {
            const waterDensity = state.waterDensity;
            const willFloat = obj.density < waterDensity;
            document.getElementById('densityValue').textContent = obj.density;
            document.getElementById('waterDensity').textContent = waterDensity.toFixed(1);
            document.getElementById('resultText').textContent = willFloat ? '✅ 夠力浮' : '❌ 唔夠力沉';
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const recent = state.experiments.slice(-10).reverse();

            if (recent.length === 0) {
                list.innerHTML = '<p style="color:#999;text-align:center;padding:20px;">還沒有實驗紀錄</p>';
                return;
            }

            list.innerHTML = recent.map(exp => `
                <div class="history-item">
                    <img src="assets/images/${exp.objectIcon}" alt="${exp.objectName}" style="width:36px;height:36px;object-fit:contain;vertical-align:middle;margin-right:6px;" onerror="this.remove()">
                    <span class="action">${exp.objectName}</span>
                    <span class="result ${exp.isFloat !== undefined ? (exp.isFloat ? 'result-float' : 'result-sink') : (exp.result === '浮' ? 'result-float' : 'result-sink')}">${exp.isFloat !== undefined ? (exp.isFloat ? '✅夠力浮' : '❌唔夠力沉') : exp.result}</span>
                </div>
            `).join('');
        }

        // ============ Settings ============
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('active');
        }

        function toggleVoice() {
            voiceOn = !voiceOn;
            state.voiceEnabled = voiceOn;
            document.getElementById('voiceIcon').textContent = voiceOn ? '🔊' : '🔇';
            document.getElementById('voiceText').textContent = voiceOn ? '語音' : '靜音';
            saveState();
            if (voiceOn) speak('語音開啟喇！');
        }

        function updateWaterDensity() {
            const value = parseFloat(document.getElementById('waterDensitySetting').value);
            state.waterDensity = Math.max(0.5, Math.min(2, value || 1));
            saveState();
            updateWaterDensityDisplay();
        }

        function updateWaterDensityDisplay() {
            document.getElementById('waterDensity').textContent = state.waterDensity.toFixed(1);
        }

        function clearAllData() {
            if (confirm('確定要清除所有數據嗎？')) {
                state = { voiceEnabled: true, waterDensity: 1.0, fontScale: 1, experiments: [] };
                saveState();
                location.reload();
            }
        }

        // ============ Voice ============
        function speak(text) {
            if (!voiceOn || !state.voiceEnabled) return;
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-HK';
                utterance.rate = 0.9;
                utterance.pitch = 1.1;
                speechSynthesis.speak(utterance);
            }
            showSoundBubble(text);
        }

        function showSoundBubble(text) {
            const bubble = document.getElementById('soundBubble');
            bubble.textContent = text;
            bubble.style.display = 'block';
            setTimeout(() => bubble.style.display = 'none', 2500);
        }

        // ============ Start ============
        setupPool();
        init();
    </script>
</body>
</html>
